services:
  - type: web
    name: classic-gadgets-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install --production=false && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: classic-gadgets-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: classic-gadgets-db
    plan: free
    databaseName: classic_gadgets
    user: postgres
